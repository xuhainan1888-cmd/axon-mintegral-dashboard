  <style>
    :root{--bg:#f6f8fa;--ink:#16212a;--muted:#60717d;--line:#dbe4e9;--panel:#fff;--teal:#0f766e;--amber:#b45309;--blue:#2563eb;--green:#15803d;--red:#b91c1c;--violet:#6d28d9;--shadow:0 14px 36px rgba(20,30,38,.07);--accent:#0f766e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;letter-spacing:0}button,input,select{font:inherit}button{cursor:pointer}.shell{min-height:100vh}.topbar{position:sticky;top:0;z-index:5;background:rgba(246,248,250,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.topbar-inner{max-width:1540px;margin:auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:12px}.mark{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#0f766e,#b45309);position:relative}.mark:before{content:"";position:absolute;left:9px;right:9px;top:17px;height:4px;background:#fff;border-radius:2px}.mark:after{content:"";position:absolute;top:9px;bottom:9px;left:17px;width:4px;background:#fff;border-radius:2px}.brand h1{font-size:16px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.seg{display:flex;gap:6px;flex-wrap:wrap}.seg button{height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 11px;color:#33434d}.seg button.active{background:var(--ink);color:#fff;border-color:var(--ink)}main{max-width:1540px;margin:auto;padding:22px}.hero{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(340px,.65fr);gap:14px;margin-bottom:14px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:16px;min-width:0}.hero-title{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.eyebrow{font-size:12px;color:var(--accent);font-weight:760;margin-bottom:8px}.hero h2{font-size:clamp(26px,3vw,42px);line-height:1.08;margin:0}.desc{color:var(--muted);line-height:1.65;font-size:14px;max-width:940px}.kpis{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;margin-top:16px}.kpi{border:1px solid var(--line);background:#fbfcfd;border-radius:8px;padding:12px;min-height:92px;display:grid;align-content:space-between}.kpi span{color:var(--muted);font-size:12px}.kpi b{font-size:22px}.kpi small{color:var(--green);font-size:11px}.decision{display:grid;gap:10px}.decision-item{border:1px solid var(--line);border-left:4px solid var(--c,var(--accent));border-radius:8px;padding:11px;background:#fbfcfd}.decision-item b{display:block;font-size:13px;margin-bottom:4px}.decision-item p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button,.ghost{border:1px solid var(--line);background:#fff;border-radius:8px;height:36px;padding:0 11px;color:#344650}.tabs button.active{background:var(--accent);border-color:var(--accent);color:#fff}.grid{display:grid;gap:14px}.layout{grid-template-columns:minmax(0,1.35fr) minmax(360px,.65fr);align-items:start}.split{grid-template-columns:repeat(2,minmax(0,1fr))}.triple{grid-template-columns:repeat(3,minmax(0,1fr))}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}.head h3{margin:0;font-size:18px}.sub{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.chart{height:310px;border:1px solid #e6edf1;border-radius:8px;background:linear-gradient(#f8fafb 1px,transparent 1px) 0 0/100% 25%,#fff;overflow:hidden}canvas{width:100%;height:100%;display:block}.rank{display:grid;gap:10px}.rank-row{display:grid;grid-template-columns:minmax(0,1fr) 90px;gap:10px;align-items:center}.rank-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.track{height:9px;background:#edf2f4;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;width:var(--w);background:var(--c,var(--accent));border-radius:99px}.val{text-align:right;font-size:12px;color:var(--muted)}.tablewrap{border:1px solid var(--line);border-radius:8px;overflow:auto}table{width:100%;border-collapse:collapse;background:#fff;font-size:13px;min-width:780px}th,td{padding:10px 11px;border-bottom:1px solid #edf1f3;text-align:left;white-space:nowrap}th{background:#f8fafb;color:#4c5d67;font-size:12px}td.wrap{white-space:normal;min-width:260px;line-height:1.45}.tag{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;background:#eef6ff;color:#1d4ed8}.tag.good{background:#e8f7ee;color:var(--green)}.tag.bad{background:#fdecec;color:var(--red)}.tag.warn{background:#fff4df;color:#a16207}.matrix{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.quad{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fbfcfd}.quad h4{margin:0 0 8px;font-size:13px}.quad ul{margin:0;padding-left:17px;color:var(--muted);font-size:13px;line-height:1.6}.asset-tools{display:flex;gap:8px;flex-wrap:wrap}.asset-tools input,.asset-tools select{height:36px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px}.assets{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.asset{border:1px solid var(--line);background:#fff;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-height:260px}.asset-media{height:180px;background:#101820;display:flex;align-items:center;justify-content:center;color:#b7cbd2;font-size:12px;position:relative;text-align:center;padding:10px}.asset video{width:100%;height:100%;object-fit:contain;background:#000}.asset-body{padding:11px;display:grid;gap:8px}.asset h4{font-size:13px;margin:0;line-height:1.35;word-break:break-word}.meta-line{color:var(--muted);font-size:12px;line-height:1.45}.chips{display:flex;flex-wrap:wrap;gap:5px}.chip{border:1px solid var(--line);border-radius:999px;padding:3px 7px;color:#51636e;font-size:11px;background:#f8fafb}.action-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:13px}.action-card h4{font-size:14px;margin:0 0 6px}.action-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.6}.op-card{border:1px solid var(--line);border-top:3px solid var(--c,var(--accent));border-radius:8px;background:#fff;padding:12px;display:grid;gap:7px}.op-card b{font-size:13px}.op-card small{color:var(--muted);font-size:11px;line-height:1.45}.op-card p{margin:0;color:#33434d;font-size:13px;line-height:1.55}.source-note{color:#7a8992;font-size:12px;line-height:1.6;margin-top:12px}.empty{padding:16px;color:var(--muted);font-size:13px;border:1px dashed var(--line);border-radius:8px;background:#fbfcfd}.brand h1{font-size:20px;font-weight:850;color:#1f6feb}.brand p{display:none}.mark{width:46px;height:46px}.topbar-inner{padding:16px 28px}.seg{gap:10px;padding:4px;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:0 10px 26px rgba(20,30,38,.08)}.seg button{height:44px;min-width:112px;border-radius:8px;padding:0 18px;font-size:16px;font-weight:750}.seg button.active{background:#101820;border-color:#101820;color:#fff;box-shadow:0 8px 18px rgba(16,24,32,.18)}.toolbar{position:sticky;top:79px;z-index:4;margin:18px 0;padding:10px 0;background:rgba(246,248,250,.94);backdrop-filter:blur(10px);border-bottom:1px solid rgba(219,228,233,.8)}.tabs{gap:10px}.tabs button{height:48px;padding:0 20px;border-radius:9px;font-size:15px;font-weight:800;background:#fff;box-shadow:0 8px 18px rgba(20,30,38,.06)}.tabs button.active{box-shadow:0 10px 22px rgba(15,118,110,.22)}@media(max-width:720px){.topbar-inner{padding:12px 14px}.brand h1{font-size:17px}.mark{width:38px;height:38px}.seg button{height:42px;min-width:96px;font-size:14px}.toolbar{top:115px;margin:12px 0;padding:8px 0}.tabs button{height:44px;min-width:max-content;padding:0 15px;font-size:14px}}@media(max-width:1180px){.hero,.layout,.split{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(3,1fr)}.assets{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.topbar-inner{display:grid}.seg{overflow:auto;flex-wrap:nowrap}.hero-title{display:grid}.kpis{grid-template-columns:repeat(2,1fr)}main{padding:14px}.assets,.triple,.matrix{grid-template-columns:1fr}.asset-media{height:240px}.toolbar{display:grid}.tabs{overflow:auto;flex-wrap:nowrap}.panel{padding:13px}}
  /* mobile-ui-fix-v3 */@media(max-width:720px){  .brand p{display:none!important}  .topbar-inner{display:grid!important;grid-template-columns:1fr!important;gap:12px!important;padding:12px 14px!important}  .brand{align-items:center!important}.brand h1{font-size:18px!important;line-height:1.25!important}.mark{width:40px!important;height:40px!important;flex:0 0 auto!important}  .seg{display:grid!important;grid-template-columns:1fr 1fr!important;gap:8px!important;width:100%!important;padding:4px!important;overflow:visible!important}  .seg button{width:100%!important;min-width:0!important;height:44px!important;font-size:15px!important;font-weight:800!important;padding:0 8px!important;white-space:nowrap!important}  .toolbar{position:static!important;display:grid!important;grid-template-columns:1fr!important;gap:10px!important;margin:14px 0!important;padding:0!important;background:transparent!important;border:0!important;backdrop-filter:none!important}  .tabs{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important;overflow:visible!important;flex-wrap:initial!important;width:100%!important}  .tabs button{width:100%!important;min-width:0!important;height:46px!important;padding:0 8px!important;font-size:14px!important;font-weight:850!important;line-height:1.05!important;white-space:nowrap!important;text-align:center!important;display:flex!important;align-items:center!important;justify-content:center!important;border-radius:9px!important}  .tabs button[data-view="campaign"]{font-size:13px!important}.tabs button[data-view="creative"]{font-size:13px!important}  #exportBtn{width:100%!important;height:44px!important;font-size:14px!important;font-weight:750!important;margin-top:2px!important}}</style>

<body><div class="shell"><header class="topbar"><div class="topbar-inner"><div class="brand"><div class="mark"></div><div><h1>许海南专属广告投放分析工作台</h1><p></p></div></div><div class="seg" id="platformSeg"></div></div></header><main><section class="hero"><article class="panel"><div class="hero-title"><div><div class="eyebrow" id="eyebrow"></div><h2 id="title"></h2><p class="desc" id="desc"></p></div><button class="ghost" id="sourceBtn">查看数据来源</button></div><div class="kpis" id="kpis"></div></article><aside class="panel"><div class="head"><div><h3>本轮决策摘要</h3><p class="sub">按投放动作排序，不是泛泛总结。</p></div></div><div class="decision" id="decisions"></div></aside></section><div class="toolbar"><div class="tabs" id="viewTabs"></div><button class="ghost" id="exportBtn">导出当前数据</button></div><section id="content"></section></main></div><script>
let DB=null;const state={platform:'mintegral',view:'overview'};const platforms={mintegral:{name:'Mintegral',accent:'#b45309'},axon:{name:'Axon',accent:'#0f766e'}};const views={overview:'总览',country:'国家',campaign:'Campaign',unit:'广告单元',creative:'素材库'};const $=s=>document.querySelector(s);const fmt=v=>v==null||v===''?'':(typeof v==='number'?v.toLocaleString(undefined,{maximumFractionDigits:2}):String(v));const money=v=>typeof v==='number'?'$'+v.toLocaleString(undefined,{maximumFractionDigits:0}):fmt(v);function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
fetch('assets/data/dashboard.json').then(r=>r.json()).then(d=>{DB=d;init()}).catch(e=>{$('#content').innerHTML='<div class="empty">数据文件加载失败，请确认 assets/data/dashboard.json 已上传。</div>'});
function init(){renderNav();$('#sourceBtn').onclick=()=>alert(Object.entries(DB.sources).map(([k,v])=>k+': '+v).join('\n'));$('#exportBtn').onclick=()=>download(JSON.stringify(currentData(),null,2),state.platform+'-'+state.view+'.json');render()}
function renderNav(){platformSeg.innerHTML=Object.entries(platforms).map(([k,p])=>`<button data-platform="${k}">${p.name}</button>`).join('');viewTabs.innerHTML=Object.entries(views).map(([k,v])=>`<button data-view="${k}">${v}</button>`).join('');document.querySelectorAll('[data-platform]').forEach(b=>b.onclick=()=>{state.platform=b.dataset.platform;state.view='overview';render()});document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render()})}
function render(){const p=platforms[state.platform];document.documentElement.style.setProperty('--accent',p.accent);document.querySelectorAll('[data-platform]').forEach(b=>b.classList.toggle('active',b.dataset.platform===state.platform));document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));eyebrow.textContent=p.name+' / '+views[state.view];state.platform==='mintegral'?renderMintegral():renderAxon();setTimeout(drawCharts,0)}
function kpi(a,b,c){return `<div class="kpi"><span>${esc(a)}</span><b>${esc(b)}</b><small>${esc(c||'')}</small></div>`}function decision(items,color){decisions.innerHTML=items.slice(0,4).map(x=>`<div class="decision-item" style="--c:${color}"><b>${esc(x.title)}</b><p>${esc(x.text)}</p></div>`).join('')}function currentData(){return DB[state.platform]}
function renderMintegral(){const d=DB.mintegral;const p=platforms.mintegral;title.textContent='Mintegral 休闲网赚游戏投放诊断';desc.textContent='把账户报告、创意报告、8单元表、近30天素材明细和国家ROAS补充表拆成国家、Campaign、广告单元、素材四个维度。';kpis.innerHTML=[kpi('总花费','$292,545','账户报告'),kpi('D7 ROAS','86.7%','未回本'),kpi('广告单元','8','本地/在线表'),kpi('国家补充',d.countryEarlyByCountry?.length||d.country.length,'国家/地区'),kpi('去重素材',d.assets.length,'含结束卡'),kpi('好差创意',d.goodbad.length,'可执行清单')].join('');decision(DB.recommendations.account,'#b45309');if(state.view==='overview')minOverview(d);if(state.view==='country')countryView(d);if(state.view==='campaign')campaignView(d);if(state.view==='unit')unitView(d);if(state.view==='creative')assetView('mintegral')}
function minOverview(d){content.innerHTML=`<div class="grid layout"><div class="grid"><article class="panel"><div class="head"><div><h3>D0 / D3 / D7 月度趋势</h3><p class="sub">4月最佳，5月成本下降但 CVR 与后续 ROAS 走弱。</p></div></div><div class="chart"><canvas id="trendChart"></canvas></div></article><div class="grid split"><article class="panel"><div class="head"><div><h3>国家预算诊断</h3><p class="sub">当前Top20显示US偏大且代理D7偏低；4月早期补充表显示部分高回收国家可单独复测。</p></div></div>${rank(d.country,'国家','花费','#b45309',10)}<p class="source-note">已接入国家ROAS补充：${fmt(d.countryEarlyRows?.length||0)} 条广告单元 x 国家记录。</p></article><article class="panel"><div class="head"><div><h3>素材类型效率</h3><p class="sub">按后台广告呈现类型，不再套用装饰卡片。</p></div></div>${typeCards(d.typePerf)}</article></div><article class="panel"><div class="head"><div><h3>创意方向作战板</h3><p class="sub">围绕休闲网赚游戏：奖励承诺、玩法门槛、广告承接一致性。</p></div></div><div class="grid triple">${creativeOps(d)}</div></article></div><aside class="grid"><article class="panel"><div class="head"><div><h3>广告单元优先级</h3><p class="sub">从8单元汇总生成。</p></div></div>${rank(d.units,'广告单元','5月程序化花费','#b45309',8)}</article><article class="panel"><div class="head"><div><h3>四象限动作</h3><p class="sub">用成本与回收拆执行动作。</p></div></div>${quadrants()}</article></aside></div>`}
function countryView(d){content.innerHTML=`<div class="grid layout"><div class="grid"><article class="panel"><div class="head"><div><h3>国家维度：当前Top20花费、eCPI 与代理D7 ROAS</h3><p class="sub">高花费低回收国家优先拆素材/版位，小量高回收国家做预算上限测试。</p></div></div>${table(d.country,['国家','花费','花费占比','转化','eCPI','代理D7 ROAS','代理D7差额'])}</article><article class="panel"><div class="head"><div><h3>国家ROAS补充：4月早期国家 x 广告单元</h3><p class="sub">来自飞书表「国家ROAS补充_4月早期」，用于回查高回收国家与单元组合。</p></div></div>${table((d.countryEarlyByCountry||[]).slice(0,30),['国家或地区','广告单元数','花费','转化','CPI','D0 ROAS%','D3 ROAS%','D7 ROAS%'])}</article></div><aside class="grid"><article class="panel"><h3>国家动作建议</h3><div class="decision" style="margin-top:12px">${countryActions(d).map(x=>`<div class="decision-item" style="--c:#b45309"><b>${esc(x.title)}</b><p>${esc(x.text)}</p></div>`).join('')}</div></article><article class="panel"><h3>当前花费排行</h3>${rank(d.country,'国家','花费','#b45309',12)}</article><article class="panel"><h3>4月高回收复测池</h3>${rank((d.countryEarlyByCountry||[]).filter(x=>num(x['D7 ROAS%'])>=100),'国家或地区','D7 ROAS%','#15803d',12)}</article></aside></div>`}
function creativeOps(d){const top=d.creativeTop?.[0]||{}, risk=d.creativeRisk?.[0]||{}, playable=d.playablePerf?.[0]||{};const ops=[{title:'放量主线',meta:`${top['素材名称']||'素材Top'} / 花费 ${top['花费']||''}`,text:'保留“真实玩法 + 明确奖励反馈”的视频开头，复制到高回收国家与稳定版位，单次加预算控制在15%-30%。',color:'#15803d'},{title:'承接主线',meta:`${playable['应用试玩结束卡片']||'Playable/Endcard'} / 花费 ${playable['花费']||''}`,text:'Playable/Endcard 是主要筛选链路。优先重做高点击低CVR素材的结束卡，不要只换视频首帧。',color:'#2563eb'},{title:'控量主线',meta:`${risk['素材名称']||'风险素材'} / D7 ${risk['代理D7 ROAS']||''}`,text:'新增 Sheep_2026_0519 与高CPI低D7素材只保留测试池；若D3斜率不追上，直接降权或暂停。',color:'#b91c1c'}];return ops.map(x=>`<div class="op-card" style="--c:${x.color}"><b>${esc(x.title)}</b><small>${esc(x.meta)}</small><p>${esc(x.text)}</p></div>`).join('')}
function countryActions(d){const current=d.country||[], early=d.countryEarlyByCountry||[];const us=current.find(x=>x['国家']==='US'), high=early.filter(x=>num(x['D7 ROAS%'])>=110&&num(x['花费'])>20).slice(0,4).map(x=>x['国家或地区']).join(' / '), cheap=current.filter(x=>num(x['eCPI'])>0&&num(x['eCPI'])<0.35).slice(0,4).map(x=>x['国家']).join(' / '), risk=current.filter(x=>num(x['代理D7 ROAS'])<75).slice(0,4).map(x=>x['国家']).join(' / ');return [{title:'US',text:`${us?`当前花费 ${us['花费']}、代理D7 ${us['代理D7 ROAS']}。`:''}不要继续全球混投加预算，先拆素材承诺、版位包与 rewarded/interstitial 类型。`},{title:'高回收复测池',text:`4月早期补充表里 ${high||'JP / MX / MY'} 等国家D7较高，适合小预算复刻高回收素材组合。`},{title:'低成本补量池',text:`${cheap||'PH / BR / CO'} eCPI较低，可以做低成本补量，但必须绑定D3/D7闸门。`},{title:'风险收缩池',text:`${risk||'低D7国家'} 先控预算上限，若同素材在高回收国家表现正常，优先判断为国家/版位质量问题。`}]}
function campaignView(d){content.innerHTML=`<div class="grid layout"><article class="panel"><div class="head"><div><h3>Campaign / 项目维度</h3><p class="sub">Mintegral当前核心以广告单元承载campaign逻辑，Axon单独在本视图展示campaign。</p></div></div>${table(d.accountUnits,['广告单元','花费','花费占比','转化','eCPI','D0 ROAS','D3 ROAS','D7 ROAS','D7回本差额'])}</article><aside class="panel"><h3>Campaign 管理规则</h3><div class="decision" style="margin-top:12px">${DB.recommendations.account.map(x=>`<div class="decision-item" style="--c:#b45309"><b>${esc(x.title)}</b><p>${esc(x.text)}</p></div>`).join('')}</div></aside></div>`}
function unitView(d){content.innerHTML=`<div class="grid layout"><article class="panel"><div class="head"><div><h3>广告单元维度：8单元执行表</h3><p class="sub">含综合建议、好创意数、差创意数与观察素材。</p></div></div>${table(d.units,['广告单元','5月程序化花费','5月程序化转化','5月程序化CPI','好创意数','差创意数','主要好创意','主要差创意','单元级建议'])}</article><aside class="grid"><article class="panel"><h3>D7 ROAS 排行</h3>${rank(d.accountUnits,'广告单元','D7 ROAS','#b45309',8)}</article><article class="panel"><h3>素材组合 Top</h3>${table(d.materialDetail.slice(0,10),['广告单元','素材名称','结束卡片名称','花费','CPI','CTR%','CVR%'])}</article></aside></div>`}
function renderAxon(){const d=DB.axon;title.textContent='Axon 账户、Campaign 与素材诊断';desc.textContent='基于 Axon 飞书报告、本地在投广告单元表和31个视频素材，重点从D0 ROAS趋势、campaign池和素材策略判断。';kpis.innerHTML=[kpi('在投Campaign',d.campaigns.length,'Excel'),kpi('D0趋势点',d.trend.length,'按日'),kpi('视频素材',d.assets.length,'全部上传'),kpi('素材体积',DB.assetStats.videoTotalMB+'MB','懒加载'),kpi('优先池','Sheep02 / Dash05','小幅放量'),kpi('关键抓手','D1留存','体验优化')].join('');decision(DB.recommendations.account,'#0f766e');if(state.view==='overview')axonOverview(d);if(state.view==='country')axonCountry(d);if(state.view==='campaign')axonCampaign(d);if(state.view==='unit')axonUnit(d);if(state.view==='creative')assetView('axon')}
function axonOverview(d){content.innerHTML=`<div class="grid layout"><div class="grid"><article class="panel"><div class="head"><div><h3>Campaign D0 ROAS趋势</h3><p class="sub">用趋势判断是否继续放量，不只看单日截图。</p></div></div><div class="chart"><canvas id="trendChart"></canvas></div></article><article class="panel"><div class="head"><div><h3>行业化创意建议</h3><p class="sub">针对排序/休闲网赚用户，补足原页面空洞问题。</p></div></div><div class="grid triple">${DB.recommendations.creative.map(x=>`<div class="action-card"><h4>${esc(x.title)}</h4><p>${esc(x.text)}</p></div>`).join('')}</div></article></div><aside class="grid"><article class="panel"><h3>Campaign花费排行</h3>${rank(d.campaigns,'广告单元','花费','#0f766e',9)}</article><article class="panel"><h3>执行摘要</h3><div class="decision" style="margin-top:12px">${[{title:'放量池',text:'Sheep02_All_tCPI_RoasD7_260326、SheepDash05，小幅放量并拆GEO/素材。'},{title:'观察池',text:'Bus Win保持预算，素材更迭后再看D27与D7曲线。'},{title:'学习期池',text:'and_sheep_04 / adroasD7_260309 留存与ROAS偏低，保持小测试。'}].map(x=>`<div class="decision-item" style="--c:#0f766e"><b>${x.title}</b><p>${x.text}</p></div>`).join('')}</div></article></aside></div>`}
function axonCountry(d){content.innerHTML=`<div class="grid layout"><article class="panel"><h3>国家维度策略</h3><p class="sub">Axon源文档没有完整国家表，但明确指出 ID / PK / PA 这类低收入国家应排除；美国与非美国建议拆开投放。</p><div class="grid triple" style="margin-top:14px">${[{title:'US',text:'单独拆 campaign 与素材承接，避免全球混投掩盖真实回收。'},{title:'非US高回收国家',text:'用小预算复制 SheepDash05 / Sheep02 的高回收组合。'},{title:'ID / PK / PA',text:'低收入国家从通投包中排除或限额，避免低价值转化稀释ROAS。'}].map(x=>`<div class="action-card"><h4>${x.title}</h4><p>${x.text}</p></div>`).join('')}</div></article><aside class="panel"><h3>需要补充的数据</h3><p class="source-note">若后续提供Axon国家明细表，可直接接入国家排行、花费占比、D0/D7回收矩阵。</p></aside></div>`}
function axonCampaign(d){content.innerHTML=`<div class="grid layout"><article class="panel"><div class="head"><div><h3>Campaign维度：在投清单</h3><p class="sub">按花费排序，结合D0/D3/D7 ROAS与历史天数。</p></div></div>${table(d.campaigns,['广告单元','展示','点击','转化','花费','D0 Ad Roas','D3 Ad Roas','D7 Ad Roas','历史天数','建议状态'])}</article><aside class="panel"><h3>Campaign动作</h3><div class="decision" style="margin-top:12px">${[{title:'小幅加预算',text:'D0/D7趋势稳定且素材可复制的包，每次加预算幅度控制在 15%-25%。'},{title:'拆GEO',text:'美国与非美国分开，低收入国家单独限额或排除。'},{title:'拆素材',text:'同一素材组合不要只看CPI，结合首次广告时机和首日留存判断质量。'}].map(x=>`<div class="decision-item" style="--c:#0f766e"><b>${x.title}</b><p>${x.text}</p></div>`).join('')}</div></aside></div>`}
function axonUnit(d){content.innerHTML=`<div class="grid layout"><article class="panel"><h3>广告单元维度</h3><p class="sub">Axon当前数据以campaign/广告单元同名承载，保留同一表，后续可接入更细广告组或创意组。</p>${table(d.campaigns,['广告单元','展示','点击','转化','花费','D0 Ad Roas','D3 Ad Roas','D7 Ad Roas','建议状态'])}</article><aside class="panel"><h3>诊断规则</h3>${quadrants()}</aside></div>`}
function assetView(platform){const assets=platform==='axon'?DB.axon.assets:DB.mintegral.assets;const d=DB.mintegral;const pre=platform==='mintegral'?`<div class="grid" style="margin-bottom:14px"><article class="panel"><div class="head"><div><h3>创意方向与素材动作</h3><p class="sub">不是空泛方向，直接对应素材Top、风险素材、Playable/Endcard承接表现。</p></div></div><div class="grid triple">${creativeOps(d)}</div></article><article class="panel"><div class="head"><div><h3>可扩与控量素材清单</h3><p class="sub">用代理D7、CPI、CVR一起判断，避免只看CTR。</p></div></div><div class="grid split"><div>${table(d.creativeTop.slice(0,10),['素材名称','花费','转化','eCPI','CTR','CVR','代理D7 ROAS'])}</div><div>${table(d.creativeRisk.slice(0,10),['素材名称','花费','转化','eCPI','代理D7 ROAS','代理D7差额'])}</div></div></article><article class="panel"><div class="head"><div><h3>Playable / Endcard 承接</h3><p class="sub">表格提供的是结束卡/试玩名称，未提供HTML包的会在素材库里标注无预览。</p></div></div>${table(d.playablePerf.slice(0,12),['应用试玩结束卡片','花费','花费占比','转化','eCPI','CTR','CVR','代理D7 ROAS'])}</article></div>`:'';content.innerHTML=`${pre}<article class="panel"><div class="head"><div><h3>${platform==='axon'?'Axon 全量视频素材库':'Mintegral 去重素材与结束卡库'}</h3><p class="sub">同一素材只展示一次，并标注使用广告单元/广告类型；Playable若只有数据名无HTML包，标注为待补预览包。</p></div><div class="asset-tools"><input id="assetSearch" placeholder="搜索素材 / 单元"><select id="assetType"><option value="">全部类型</option><option>Video</option><option>Image</option><option>Playable/Endcard</option><option>Dynamic</option><option>Other</option></select></div></div><div class="assets" id="assetGrid"></div><p class="source-note">GitHub Pages会按需加载视频；请上传 assets/videos 与 assets/data 文件夹，否则素材预览和数据会缺失。</p></article>`;const renderAssets=()=>{const q=assetSearch.value.toLowerCase(),t=assetType.value;let list=assets.filter(a=>(!t||a.type===t)&&JSON.stringify(a).toLowerCase().includes(q)).slice(0,platform==='axon'?40:60);assetGrid.innerHTML=list.map(a=>assetCard(a,platform)).join('')||'<div class="empty">没有匹配素材。</div>'};assetSearch.oninput=renderAssets;assetType.onchange=renderAssets;renderAssets()}
function assetCard(a,platform){const uses=a.adUnits||a.usedBy||[], shown=uses.slice(0,5).map(x=>`<span class="chip">${esc(x)}</span>`).join(''), more=uses.length>5?`<span class="chip">+${uses.length-5}</span>`:'';const typeTags=(a.adTypes||a.roles||[]).slice(0,3).map(x=>`<span class="chip">${esc(x)}</span>`).join('');const media=a.src?`<video controls playsinline webkit-playsinline preload="metadata" src="${esc(a.src)}?v=mobile2" type="video/mp4"></video>`:`<div><b>${esc(a.type)}</b><br><span>${a.type==='Playable/Endcard'?'数据表有名称，未提供HTML包':'无预览文件'}</span></div>`;return `<div class="asset"><div class="asset-media">${media}</div><div class="asset-body"><h4>${esc(a.name)}</h4><div class="chips"><span class="chip">${esc(a.type)}</span>${shown}${more}</div><div class="chips">${typeTags}</div><div class="meta-line">${platform==='axon'?`大小 ${a.sizeMB}MB`:`花费 ${money(a.spend)} / 转化 ${fmt(a.conversions)} / 使用 ${fmt(a.usageCount)} 次`}</div><div class="meta-line">使用范围：${esc(uses.join('、')||'未在表格中关联具体单元')}</div><div class="meta-line">${esc(a.recommendation||a.note||'按广告单元、国家和回收表现继续验证。')}</div></div></div>`}
function typeCards(rows){return `<div class="grid">${rows.map(r=>`<div class="action-card"><h4>${esc(r['广告呈现类型']||r['素材类型']||r['类型'])}</h4><p>花费 ${esc(r['花费'])}，转化 ${esc(r['转化'])}，eCPI ${esc(r['eCPI'])}，代理D7 ${esc(r['代理D7 ROAS']||'')}</p></div>`).join('')}</div>`}
function quadrants(){return `<div class="matrix"><div class="quad"><h4>高ROAS / 低CPI</h4><ul><li>复制素材+结束卡组合</li><li>小幅加预算验证上限</li></ul></div><div class="quad"><h4>高ROAS / 高CPI</h4><ul><li>拆国家与版位保留</li><li>不进入泛扩量池</li></ul></div><div class="quad"><h4>低ROAS / 低CPI</h4><ul><li>低成本补量观察</li><li>D3不追上则停</li></ul></div><div class="quad"><h4>低ROAS / 高CPI</h4><ul><li>暂停或重做承接</li><li>检查素材承诺错位</li></ul></div></div>`}
function rank(rows,label,value,color,limit){const vals=rows.map(r=>num(r[value])).filter(v=>!isNaN(v));const max=Math.max(...vals,1);return `<div class="rank">${rows.filter(r=>r[label]).slice(0,limit).map(r=>{let v=num(r[value]);return `<div class="rank-row"><div><div class="rank-name">${esc(r[label])}</div><div class="track"><div class="fill" style="--w:${Math.max(3,Math.round((v||0)/max*100))}%;--c:${color}"></div></div></div><div class="val">${esc(r[value])}</div></div>`}).join('')}</div>`}
function num(v){if(typeof v==='number')return v;return parseFloat(String(v||'').replace(/[$,%]/g,'').replace(/,/g,''))||0}function table(rows,cols){return `<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.filter(r=>cols.some(c=>r[c]!=null&&r[c]!=='' )).slice(0,80).map(r=>`<tr>${cols.map(c=>cell(c,r[c])).join('')}</tr>`).join('')}</tbody></table></div>`}function cell(c,v){let s=fmt(v);if(c.includes('建议')||c.includes('动作')||c.includes('风险'))return `<td class="wrap">${esc(s)}</td>`;if(c.includes('ROAS')&&num(s)>=90)return `<td><span class="tag good">${esc(s)}</span></td>`;if(c.includes('ROAS')&&num(s)<60&&s!=='')return `<td><span class="tag bad">${esc(s)}</span></td>`;return `<td>${esc(s)}</td>`}
function drawCharts(){const c=document.getElementById('trendChart');if(!c)return;const ctx=c.getContext('2d'),r=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=Math.max(600,r.width*dpr);c.height=Math.max(260,r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);const w=c.width/dpr,h=c.height/dpr,p={l:45,r:24,t:24,b:35};ctx.clearRect(0,0,w,h);ctx.strokeStyle='#e6edf1';for(let i=0;i<=4;i++){let y=p.t+(h-p.t-p.b)/4*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke()}let series=[];if(state.platform==='axon'){let tr=DB.axon.trend,keys=Object.keys(tr[tr.length-1]||{}).filter(k=>k!=='date').slice(0,5);series=keys.map((k,i)=>({name:k,color:['#0f766e','#2563eb','#b45309','#6d28d9','#be123c'][i],data:tr.map(x=>({label:x.date,value:num(x[k])}))}))}else{let rows=[{m:'03',d0:55.7,d3:74,d7:83.6},{m:'04',d0:61.1,d3:79.9,d7:90.1},{m:'05',d0:58.9,d3:76.2,d7:86.6},{m:'06',d0:55,d3:60.2,d7:60.4}];series=['d0','d3','d7'].map((k,i)=>({name:k.toUpperCase()+' ROAS',color:['#2563eb','#b45309','#0f766e'][i],data:rows.map(x=>({label:x.m,value:x[k]}))}))}let all=series.flatMap(s=>s.data.map(x=>x.value)),max=Math.max(...all,100),min=0;series.forEach(s=>drawLine(ctx,s,p,w,h,min,max));ctx.font='12px Arial';ctx.fillStyle='#60717d';let labels=series[0]?.data||[];labels.forEach((x,i)=>{if(i%Math.ceil(labels.length/6)===0){let xx=p.l+i/(labels.length-1||1)*(w-p.l-p.r);ctx.fillText(String(x.label).slice(0,8),xx-12,h-12)}});let lx=p.l;series.forEach(s=>{ctx.fillStyle=s.color;ctx.fillRect(lx,10,10,10);ctx.fillStyle='#60717d';ctx.fillText(s.name,lx+14,19);lx+=Math.min(170,s.name.length*8+34)})}
function drawLine(ctx,s,p,w,h,min,max){const pw=w-p.l-p.r,ph=h-p.t-p.b;ctx.beginPath();ctx.strokeStyle=s.color;ctx.lineWidth=2.4;s.data.forEach((d,i)=>{let x=p.l+i/(s.data.length-1||1)*pw,y=p.t+ph-(d.value-min)/(max-min||1)*ph;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke()}function download(text,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'application/json'}));a.download=name;a.click()}
</script></body></html>
