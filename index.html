function countryActions(d){const current=d.country||[], early=d.countryEarlyByCountry||[];const us=current.find(x=>x['国家']==='US'), high=early.filter(x=>num(x['D7 ROAS%'])>=110&&num(x['花费'])>20).slice(0,4).map(x=>x['国家或地区']).join(' / '), cheap=current.filter(x=>num(x['eCPI'])>0&&num(x['eCPI'])<0.35).slice(0,4).map(x=>x['国家']).join(' / '), risk=current.filter(x=>num(x['代理D7 ROAS'])<75).slice(0,4).map(x=>x['国家']).join(' / ');return [{title:'US',text:`${us?`当前花费 ${us['花费']}、代理D7 ${us['代理D7 ROAS']}。`:''}不要继续全球混投加预算，先拆素材承诺、版位包与 rewarded/interstitial 类型。`},{title:'高回收复测池',text:`4月早期补充表里 ${high||'JP / MX / MY'} 等国家D7较高，适合小预算复刻高回收素材组合。`},{title:'低成本补量池',text:`${cheap||'PH / BR / CO'} eCPI较低，可以做低成本补量，但必须绑定D3/D7闸门。`},{title:'风险收缩池',text:`${risk||'低D7国家'} 先控预算上限，若同素材在高回收国家表现正常，优先判断为国家/版位质量问题。`}]}

function drawUnitTrendCanvas(c,u,r,full){const ctx=c.getContext('2d'),rect=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=Math.max(300,rect.width*dpr);c.height=Math.max(full?260:90,rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);const w=c.width/dpr,h=c.height/dpr,p=full?{l:42,r:34,t:24,b:32}:{l:6,r:6,t:8,b:8};ctx.clearRect(0,0,w,h);const data=(u.daily||[]).filter(x=>x.date),pw=w-p.l-p.r,ph=h-p.t-p.b;if(!data.length)return;const spendMax=Math.max(...data.map(x=>Number(x.spend||0)),1);const roasKeys=r.platform==='axon'?['d0','d7','d28']:['d0','d7'];const roasVals=data.flatMap(x=>roasKeys.map(k=>x[k]).filter(v=>v!=null).map(Number));const roasMax=Math.max(...roasVals,120,...(r.baselines||[]));if(full){ctx.strokeStyle='#edf1f3';for(let i=0;i<=4;i++){const y=p.t+ph/4*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke()}ctx.fillStyle='#60717d';ctx.font='11px Arial';ctx.fillText(trendMoney(spendMax),p.l,14);ctx.fillText(Math.round(roasMax)+'%',w-p.r-34,14)}function xy(v,i,max){return [p.l+(data.length===1?0:i/(data.length-1)*pw),p.t+ph-(Number(v||0)/max)*ph]}function line(key,color,max,width,skipNull){ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=width;let started=false;data.forEach((d,i)=>{if(skipNull&&d[key]==null){started=false;return}const [x,y]=xy(d[key],i,max);if(started)ctx.lineTo(x,y);else{ctx.moveTo(x,y);started=true}});ctx.stroke()}line('spend','#2563eb',spendMax,full?2.8:2,false);line('d0','#b45309',roasMax,full?2.2:1.8,true);line('d7','#6d28d9',roasMax,full?2.2:1.8,true);if(r.platform==='axon')line('d28','#15803d',roasMax,full?2.2:1.8,true);if(full){(r.baselines||[]).forEach(b=>{ctx.setLineDash([5,5]);ctx.beginPath();ctx.strokeStyle=b>=100?'#111827':'#dc2626';ctx.lineWidth=1.6;let y=xy(b,0,roasMax)[1];ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=b>=100?'#111827':'#dc2626';ctx.font='11px Arial';ctx.fillText(b+'%',w-p.r-28,y-4)});ctx.fillStyle='#60717d';ctx.font='11px Arial';for(let i=0;i<data.length;i+=Math.ceil(data.length/5)){const [x]=xy(0,i,1);ctx.fillText(data[i].date.slice(5),x-14,h-10)}}}

function officialCreativeMonitorGuide(){const r=OFFICIAL_REPORTS,play=r.presentation.byDimension.find(x=>x['广告呈现类型']==='应用试玩创意')||{},std=r.presentation.byDimension.find(x=>x['广告呈现类型']==='标准创意')||{},dyn=r.presentation.byDimension.find(x=>x['广告呈现类型']==='应用动态创意')||{},topType=r.adType.byDimension[0]||{},topCombo=r.detail.topCombos[0]||{};return `<article class="panel"><div class="head"><div><h3>Mintegral 官方 Creative Monitor 看数口径</h3><p class="sub">来源：Mintegral Help Center「Creative Monitor」。官方建议按时间范围、多维筛选、关键指标和创意组合对比来找优化机会。</p></div></div><div class="grid triple"><div class="op-card" style="--c:#2563eb"><b>01 先按广告类型判断流量形态</b><p>官方建议先用 Ad Type 拆展示、点击、转化和花费，判断不同广告类型的效率差异。本期最高花费广告类型为 ${esc(topType['广告类型']||'')}，花费 ${money(topType['花费']||0)}，eCPI ${esc(topType['eCPI']||'')}；它应作为预算复核主线，而不是只看单个素材名。</p></div><div class="op-card" style="--c:#b45309"><b>02 再按广告呈现类型判断承接结构</b><p>官方将输出类型拆为标准素材、动态交互和 Playable。当前应用试玩创意花费 ${money(play['花费']||0)}、eCPI ${esc(play['eCPI']||'')}；标准创意花费 ${money(std['花费']||0)}、eCPI ${esc(std['eCPI']||'')}；动态创意虽然 CTR/CVR 高，但 eCPI ${esc(dyn['eCPI']||'')}，需要小预算验证。</p></div><div class="op-card" style="--c:#0f766e"><b>03 最后看 Ad + Creative + Endcard 组合</b><p>官方强调不同视频、图片、结束卡或试玩组合会带来不同 CTR、IVR、CVR。当前 Top 组合为 ${esc(topCombo['素材 × 结束卡']||'')}，花费 ${money(topCombo['花费']||0)}，eCPI ${esc(topCombo['eCPI']||'')}；后续优化应复制组合结构，而不是只复制视频文件。</p></div></div><div class="grid split" style="margin-top:14px"><div class="action-card"><h4>当前表已覆盖的官方指标</h4><p>已接入展示、点击、转化、花费、eCPI、eCPM、CTR、CVR，可用于判断素材吸引力、点击后转化和成本效率。</p></div><div class="action-card"><h4>下次导出建议补充</h4><p>如果后台可选字段，建议同时导出 IVR、国家/地区、Offer Name、Ad ID、Creative ID、Endcard ID；这样能把“哪个国家 + 哪个组合”真正拆清楚。</p></div></div><p class="source-note">官方文档：<a href="https://helpcenter.mintegral.com/cn/docs/Creative-Monitor" target="_blank" rel="noopener">Mintegral Creative Monitor</a>。本页已按该文档把你的 creative 三张表分别对应到广告类型、广告呈现类型、Ad + Creative + Endcard 三个分析层级。</p></article>`}

function quadrants(){return `<div class="matrix"><div class="quad"><h4>高ROAS / 低CPI</h4><ul><li>复制素材+结束卡组合</li><li>小幅加预算验证上限</li></ul></div><div class="quad"><h4>高ROAS / 高CPI</h4><ul><li>拆国家与版位保留</li><li>不进入泛扩量池</li></ul></div><div class="quad"><h4>低ROAS / 低CPI</h4><ul><li>低成本补量观察</li><li>D3不追上则停</li></ul></div><div class="quad"><h4>低ROAS / 高CPI</h4><ul><li>暂停或重做承接</li><li>检查素材承诺错位</li></ul></div></div>`}
function rank(rows,label,value,color,limit){const vals=rows.map(r=>num(r[value])).filter(v=>!isNaN(v));const max=Math.max(...vals,1);return `<div class="rank">${rows.filter(r=>r[label]).slice(0,limit).map(r=>{let v=num(r[value]);return `<div class="rank-row"><div><div class="rank-name">${esc(r[label])}</div><div class="track"><div class="fill" style="--w:${Math.max(3,Math.round((v||0)/max*100))}%;--c:${color}"></div></div></div><div class="val">${esc(r[value])}</div></div>`}).join('')}</div>`}
function num(v){if(typeof v==='number')return v;return parseFloat(String(v||'').replace(/[$,%]/g,'').replace(/,/g,''))||0}function table(rows,cols){return `<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.filter(r=>cols.some(c=>r[c]!=null&&r[c]!=='' )).slice(0,80).map(r=>`<tr>${cols.map(c=>cell(c,r[c])).join('')}</tr>`).join('')}</tbody></table></div>`}function cell(c,v){let s=fmt(v);if(c.includes('建议')||c.includes('动作')||c.includes('风险'))return `<td class="wrap">${esc(s)}</td>`;if(c.includes('ROAS')&&num(s)>=90)return `<td><span class="tag good">${esc(s)}</span></td>`;if(c.includes('ROAS')&&num(s)<60&&s!=='')return `<td><span class="tag bad">${esc(s)}</span></td>`;return `<td>${esc(s)}</td>`}
function drawCharts(){if(state.platform==='mintegral'&&state.view==='trend'){drawTrendReportCharts();return}const c=document.getElementById('trendChart');if(!c)return;const ctx=c.getContext('2d'),r=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=Math.max(600,r.width*dpr);c.height=Math.max(260,r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);const w=c.width/dpr,h=c.height/dpr,p={l:45,r:24,t:24,b:35};ctx.clearRect(0,0,w,h);ctx.strokeStyle='#e6edf1';for(let i=0;i<=4;i++){let y=p.t+(h-p.t-p.b)/4*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke()}let series=[];if(state.platform==='axon'){series=applovinTrendSeries()}else{let rows=(OFFICIAL_REPORTS.performance&&OFFICIAL_REPORTS.performance.monthly)||[{月份:'2026-03','D0 ROAS%':55.7,'D3 ROAS%':74,'D7 ROAS%':83.6},{月份:'2026-04','D0 ROAS%':61.1,'D3 ROAS%':79.9,'D7 ROAS%':90.1},{月份:'2026-05','D0 ROAS%':58.9,'D3 ROAS%':76.2,'D7 ROAS%':86.6},{月份:'2026-06','D0 ROAS%':55,'D3 ROAS%':60.2,'D7 ROAS%':60.4}];series=['D0 ROAS%','D3 ROAS%','D7 ROAS%'].map((k,i)=>({name:k.replace('%',''),color:['#2563eb','#b45309','#0f766e'][i],data:rows.map(x=>({label:String(x['月份']).slice(5),value:num(x[k])}))}))}let all=series.flatMap(s=>s.data.map(x=>x.value)),max=Math.max(...all,100),min=0;series.forEach(s=>drawLine(ctx,s,p,w,h,min,max));ctx.font='12px Arial';ctx.fillStyle='#60717d';let labels=series[0]?.data||[];labels.forEach((x,i)=>{if(i%Math.ceil(labels.length/6)===0){let xx=p.l+i/(labels.length-1||1)*(w-p.l-p.r);ctx.fillText(String(x.label).slice(0,8),xx-12,h-12)}});let lx=p.l;series.forEach(s=>{ctx.fillStyle=s.color;ctx.fillRect(lx,10,10,10);ctx.fillStyle='#60717d';ctx.fillText(s.name,lx+14,19);lx+=Math.min(170,s.name.length*8+34)})}
function drawLine(ctx,s,p,w,h,min,max){const pw=w-p.l-p.r,ph=h-p.t-p.b;ctx.beginPath();ctx.strokeStyle=s.color;ctx.lineWidth=2.4;s.data.forEach((d,i)=>{let x=p.l+i/(s.data.length-1||1)*pw,y=p.t+ph-(d.value-min)/(max-min||1)*ph;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke()}function download(text,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'application/json'}));a.download=name;a.click()}
