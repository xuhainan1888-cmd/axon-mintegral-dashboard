function assetView(platform){if(platform==='mintegral'){const d=DB.mintegral,assets=d.assets||[];const cards=assets.slice(0,36).map(a=>minAssetTextCard(a)).join('');content.innerHTML=`<div class="grid"><article class="panel"><div class="head"><div><h3>Mintegral 素材与承接诊断</h3><p class="sub">当前只拿到素材名称、结束卡名称和投放指标，没有原始视频或HTML试玩包；因此这里不展示缩略图，只做素材档案、承接链路和投放动作。</p></div></div><div class="grid triple">${creativeOps(d)}</div></article><article class="panel"><div class="head"><div><h3>素材工作流</h3><p class="sub">从数据表到执行动作，避免把“无预览素材”误当成真实素材库。</p></div></div><div class="grid triple">${['素材名称去重：合并同名视频、图片、Playable/Endcard，统计使用广告单元与广告类型。','效率分层：用花费、CPI、CVR、代理D7 ROAS拆成放量、观察、控量三类。','承接复查：高CTR低CVR优先检查结束卡、商店页首屏和国家/版位，而不是只换视频。'].map((x,i)=>`<div class="op-card" style="--c:${['#b45309','#2563eb','#15803d'][i]}"><b>${['01 数据归并','02 指标分层','03 动作落地'][i]}</b><p>${x}</p></div>`).join('')}</div></article><article class="panel"><div class="head"><div><h3>可扩与控量素材清单</h3><p class="sub">用代理D7、CPI、CVR一起判断，避免只看CTR。</p></div></div><div class="grid split"><div>${table(d.creativeTop.slice(0,10),['素材名称','花费','转化','eCPI','CTR','CVR','代理D7 ROAS'])}</div><div>${table(d.creativeRisk.slice(0,10),['素材名称','花费','转化','eCPI','代理D7 ROAS','代理D7差额'])}</div></div></article><article class="panel"><div class="head"><div><h3>Playable / Endcard 承接表</h3><p class="sub">这里只代表表格里的试玩/结束卡名称与指标，没有HTML包，所以不做可视预览。</p></div></div>${table(d.playablePerf.slice(0,12),['应用试玩结束卡片','花费','花费占比','转化','eCPI','CTR','CVR','代理D7 ROAS'])}</article><article class="panel"><div class="head"><div><h3>去重素材档案</h3><p class="sub">同一素材只出现一次，标注使用范围、广告类型和建议动作。</p></div><div class="asset-tools"><input id="assetSearch" placeholder="搜索素材 / 单元"><select id="assetType"><option value="">全部类型</option><option>Video</option><option>Image</option><option>Playable/Endcard</option><option>Dynamic</option><option>Other</option></select></div></div><div class="grid triple" id="assetGrid">${cards}</div></article></div>`;const renderAssets=()=>{const q=assetSearch.value.toLowe function renderTrendUnitDetail(i){const u=MINTEGRAL_UNIT_TRENDS.units[i]||MINTEGRAL_UNIT_TRENDS.units[0];if(!u)return;trendUnitDetail.innerHTML=`<div class="trend-hero"><div><div class="trend-chart"><canvas id="unitTrendMain"></canvas></div><div class="legend"><span><i style="background:#2563eb"></i>花费</span><span><i style="background:#b45309"></i>D0 ROAS</span><span><i style="background:#0f766e"></i>D3 ROAS</span><span><i style="background:#6d28d9"></i>D7 ROAS</span><span><i style="background:#b91c1c"></i>50%基准</span></div></div><aside class="grid"><div class="trend-metrics"><div class="trend-metric"><span>周期消耗</span><b>${trendMoney(u.totalSpend)}</b></div><div class="trend-metric"><span>转化</span><b>${fmt(u.totalConversions)}</b></div><div class="trend-metric"><span>均 eCPI</span><b>${u.avgEcpi==null?'':('$'+u.avgEcpi)}</b></div><div class="trend-metric"><span>最新D7</span><b>${trendPct(u.latestD7)}</b></div></div><div class="action-card"><h4>趋势判断</h4><p>${trendUnitAdvice(u)}</p></div></aside></div><div style="margin-top:14px">${table(u.daily.slice(-18).reverse().map(x=>({'日期':x.date,'花费':trendMoney(x.spend),'转化':x.conversions,'eCPI':x.ecpi==null?'':'$'+x.ecpi,'D0 ROAS':trendPct(x.d0),'D3 ROAS':trendPct(x.d3),'D7 ROAS':trendPct(x.d7)})),['日期','花费','转化','eCPI','D0 ROAS','D3 ROAS','D7 ROAS'])}</div>`;setTimeout(drawTrendReportCharts,0)}
function trendUnitAdvice(u){const d0=Number(u.latestD0||0),d7=Number(u.latestD7||0),sp=Number(u.totalSpend||0);if(d7>=90&&d0>=55)return '当前 D0 与 D7 都较健康，可作为放量候选，但建议每次预算上调控制在 15%-25%，观察次日 D0 是否塌陷。';if(sp>5000&&d7<70)return '该单元消耗较高但 D7 偏低，应优先压预算或拆国家/版位复查，避免继续用规模掩盖回收问题。';if(d0<35)return '最新 D0 偏低，短期不要加预算；先看素材承诺、结束卡和广告承接是否导致低价值转化。';return '维持观察池，重点看连续 3 天 D0 斜率和消耗是否同向改善，再决定放量或控量。'}
function drawTrendReportCharts(){const units=MINTEGRAL_UNIT_TRENDS.units||[];const sel=document.getElementById('trendUnitSelect');const idx=sel?Number(sel.value||0):0;const u=units[idx];if(u&&document.getElementById('unitTrendMain'))drawUnitTrendCanvas(document.getElementById('unitTrendMain'),u,true);units.forEach((x,i)=>{const c=document.getElementById('miniTrend_'+i);if(c)drawUnitTrendCanvas(c,x,false)})}
function drawUnitTrendCanvas(c,u,full){const ctx=c.getContext('2d'),r=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=Math.max(300,r.width*dpr);c.height=Math.max(full?260:90,r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);const w=c.width/dpr,h=c.height/dpr,p=full?{l:42,r:28,t:24,b:32}:{l:6,r:6,t:8,b:8};ctx.clearRect(0,0,w,h);const data=(u.daily||[]).filter(x=>x.date),pw=w-p.l-p.r,ph=h-p.t-p.b;if(!data.length)return;const spendMax=Math.max(...data.map(x=>Number(x.spend||0)),1),roasMax=Math.max(120,...data.flatMap(x=>[x.d0,x.d3,x.d7].map(v=>Number(v||0))));if(full){ctx.strokeStyle='#edf1f3';for(let i=0;i<=4;i++){const y=p.t+ph/4*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke()}ctx.fillStyle='#60717d';ctx.font='11px Arial';ctx.fillText(trendMoney(spendMax),p.l,14);ctx.fillText(Math.round(roasMax)+'%',w-p.r-34,14)}function xy(v,i,max){return [p.l+(data.length===1?0:i/(data.length-1)*pw),p.t+ph-(Number(v||0)/max)*ph]}function line(key,color,max,width){ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=width;data.forEach((d,i)=>{const [x,y]=xy(d[key],i,max);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke()}line('spend','#2563eb',spendMax,full?2.8:2);if(full){line('d0','#b45309',roasMax,2.2);line('d3','#0f766e',roasMax,2.2);line('d7','#6d28d9',roasMax,2.2);ctx.setLineDash([4,4]);ctx.beginPath();ctx.strokeStyle='#b91c1c';let y=xy(50,0,roasMax)[1];ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#60717d';ctx.font='11px Arial';for(let i=0;i<data.length;i+=Math.ceil(data.length/5)){const [x]=xy(0,i,1);ctx.fillText(data[i].date.slice(5),x-14,h-10)}}else{line('d0','#b45309',100,1.8)}}

function rank(rows,label,value,color,limit){const vals=rows.map(r=>num(r[value])).filter(v=>!isNaN(v));const max=Math.max(...vals,1);return `<div class="rank">${rows.filter(r=>r[label]).slice(0,limit).map(r=>{let v=num(r[value]);return `<div class="rank-row"><div><div class="rank-name">${esc(r[label])}</div><div class="track"><div class="fill" style="--w:${Math.max(3,Math.round((v||0)/max*100))}%;--c:${color}"></div></div></div><div class="val">${esc(r[value])}</div></div>`}).join('')}</div>`}
function num(v){if(typeof v==='number')return v;return parseFloat(String(v||'').replace(/[$,%]/g,'').replace(/,/g,''))||0}function table(rows,cols){return `<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.filter(r=>cols.some(c=>r[c]!=null&&r[c]!=='' )).slice(0,80).map(r=>`<tr>${cols.map(c=>cell(c,r[c])).join('')}</tr>`).join('')}</tbody></table></div>`}function cell(c,v){let s=fmt(v);if(c.includes('建议')||c.includes('动作')||c.includes('风险'))return `<td class="wrap">${esc(s)}</td>`;if(c.includes('ROAS')&&num(s)>=90)return `<td><span class="tag good">${esc(s)}</span></td>`;if(c.includes('ROAS')&&num(s)<60&&s!=='')return `<td><span class="tag bad">${esc(s)}</span></td>`;return `<td>${esc(s)}</td>`}
function drawCharts(){if(state.platform==='mintegral'&&state.view==='trend'){drawTrendReportCharts();return}const c=document.getElementById('trendChart');if(!c)return;const ctx=c.getContext('2d'),r=c.getBoundingClientRect(),dpr=devicePixelRatio||1;c.width=Math.max(600,r.width*dpr);c.height=Math.max(260,r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);const w=c.width/dpr,h=c.height/dpr,p={l:45,r:24,t:24,b:35};ctx.clearRect(0,0,w,h);ctx.strokeStyle='#e6edf1';for(let i=0;i<=4;i++){let y=p.t+(h-p.t-p.b)/4*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke()}let series=[];if(state.platform==='axon'){let tr=DB.axon.trend,keys=Object.keys(tr[tr.length-1]||{}).filter(k=>k!=='date').slice(0,5);series=keys.map((k,i)=>({name:k,color:['#0f766e','#2563eb','#b45309','#6d28d9','#be123c'][i],data:tr.map(x=>({label:x.date,value:num(x[k])}))}))}else{let rows=[{m:'03',d0:55.7,d3:74,d7:83.6},{m:'04',d0:61.1,d3:79.9,d7:90.1},{m:'05',d0:58.9,d3:76.2,d7:86.6},{m:'06',d0:55,d3:60.2,d7:60.4}];series=['d0','d3','d7'].map((k,i)=>({name:k.toUpperCase()+' ROAS',color:['#2563eb','#b45309','#0f766e'][i],data:rows.map(x=>({label:x.m,value:x[k]}))}))}let all=series.flatMap(s=>s.data.map(x=>x.value)),max=Math.max(...all,100),min=0;series.forEach(s=>drawLine(ctx,s,p,w,h,min,max));ctx.font='12px Arial';ctx.fillStyle='#60717d';let labels=series[0]?.data||[];labels.forEach((x,i)=>{if(i%Math.ceil(labels.length/6)===0){let xx=p.l+i/(labels.length-1||1)*(w-p.l-p.r);ctx.fillText(String(x.label).slice(0,8),xx-12,h-12)}});let lx=p.l;series.forEach(s=>{ctx.fillStyle=s.color;ctx.fillRect(lx,10,10,10);ctx.fillStyle='#60717d';ctx.fillText(s.name,lx+14,19);lx+=Math.min(170,s.name.length*8+34)})}
function drawLine(ctx,s,p,w,h,min,max){const pw=w-p.l-p.r,ph=h-p.t-p.b;ctx.beginPath();ctx.strokeStyle=s.color;ctx.lineWidth=2.4;s.data.forEach((d,i)=>{let x=p.l+i/(s.data.length-1||1)*pw,y=p.t+ph-(d.value-min)/(max-min||1)*ph;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke()}function download(text,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'application/json'}));a.download=name;a.click()}
</script></body></html>
